services:
  - type: web
    name: friday-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 web_gui:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 5000
      - key: WEB_HOST
        value: 0.0.0.0
      - key: GROQ_API_KEY
        sync: false # Set this in the Render Dashboard
      - key: SECRET_KEY
        generateValue: true
